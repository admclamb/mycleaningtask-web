name: Continuous Integration

on:
  pull_request:
    branches:
      - master

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Check code formatting
        run: pnpm format

      - name: Run build
        run: pnpm build --configuration=staging
        env:
          NODE_ENV: production
          NG_APP_API_SERVER_URL: ${{ secrets.NG_APP_API_SERVER_URL }}
          NG_APP_AUTH0_DOMAIN: ${{ secrets.NG_APP_AUTH0_DOMAIN }}
          NG_APP_AUTH0_CLIENT_ID: ${{ secrets.NG_APP_AUTH0_CLIENT_ID }}
          NG_APP_AUTH0_AUDIENCE: ${{ secrets.NG_APP_AUTH0_AUDIENCE }}
          NG_APP_AUTH0_CALLBACK_URL: ${{ secrets.NG_APP_AUTH0_CALLBACK_URL }}
          NG_APP_AUTH_CACHE_LOCATION: ${{ secrets.NG_APP_AUTH_CACHE_LOCATION }}
          NG_APP_AUTH0_USE_REFRESH_TOKENS: ${{ secrets.NG_APP_AUTH0_USE_REFRESH_TOKENS }}

      - name: Run tests
        run: pnpm test --watch=false --code-coverage
        env:
          NODE_ENV: test
          NG_APP_API_SERVER_URL: ${{ secrets.NG_APP_API_SERVER_URL }}
          NG_APP_AUTH0_DOMAIN: ${{ secrets.NG_APP_AUTH0_DOMAIN }}
          NG_APP_AUTH0_CLIENT_ID: ${{ secrets.NG_APP_AUTH0_CLIENT_ID }}
          NG_APP_AUTH0_AUDIENCE: ${{ secrets.NG_APP_AUTH0_AUDIENCE }}
          NG_APP_AUTH0_CALLBACK_URL: ${{ secrets.NG_APP_AUTH0_CALLBACK_URL }}
          NG_APP_AUTH_CACHE_LOCATION: ${{ secrets.NG_APP_AUTH_CACHE_LOCATION }}
          NG_APP_AUTH0_USE_REFRESH_TOKENS: ${{ secrets.NG_APP_AUTH0_USE_REFRESH_TOKENS }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-pr
          path: coverage/
